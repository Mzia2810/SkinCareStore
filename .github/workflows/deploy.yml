name: Deploy to Azure VM

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Setup Node.js
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      # 3️⃣ Install backend dependencies
      - name: Install backend dependencies
        working-directory: ./backend
        run: npm install

      # 4️⃣ Build frontend
      - name: Build frontend
        working-directory: ./frontend
        run: |
          npm install
          npm run build

      # 5️⃣ Copy backend to VM
      - name: Copy backend to VM
        uses: appleboy/scp-action@v0.1.5
        with:
          host: ${{ secrets.VM_IP }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: 22
          source: "backend/**"
          target: /home/${{ secrets.VM_USER }}/SkinCareStore/backend
          rm: true
          overwrite: true

      # 6️⃣ Copy frontend to VM temporary folder
      - name: Copy frontend to VM temp
        uses: appleboy/scp-action@v0.1.5
        with:
          host: ${{ secrets.VM_IP }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: 22
          source: "frontend/dist/**"
          target: /home/${{ secrets.VM_USER }}/frontend_temp
          rm: true
          overwrite: true

      # 7️⃣ SSH and deploy backend + move frontend
      - name: SSH and deploy
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ secrets.VM_IP }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: 22
          script: |
            # 🔹 Stop backend if running
            pm2 stop skin-backend || true
            pm2 delete skin-backend || true

            # 🔹 Start backend
            cd /home/${{ secrets.VM_USER }}/SkinCareStore/backend
            pm2 start index.js --name skin-backend
            pm2 save

            # 🔹 Move frontend from temp to /var/www/html (sudo required)
            sudo rm -rf /var/www/html/*
            sudo mv /home/${{ secrets.VM_USER }}/frontend_temp/* /var/www/html/
            sudo chown -R www-data:www-data /var/www/html
            sudo chmod -R 755 /var/www/html

            # 🔹 Restart Nginx
            sudo systemctl restart nginx