name: Skincare Docker CI/CD

on:
  push:
    branches:
      - main

env:
  ACR_LOGIN_SERVER: skincarecontainer.azurecr.io
  BACKEND_IMAGE: skincare-backend
  FRONTEND_IMAGE: skincare-frontend

jobs:

# =========================
# BUILD & PUSH IMAGES
# =========================
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Login to ACR
      run: |
        echo "${{ secrets.ACR_PASSWORD }}" | docker login $ACR_LOGIN_SERVER \
        --username ${{ secrets.ACR_USERNAME }} --password-stdin

    - name: Build and Push Backend
      run: |
        docker build -t $ACR_LOGIN_SERVER/$BACKEND_IMAGE:latest ./backend
        docker push $ACR_LOGIN_SERVER/$BACKEND_IMAGE:latest

    - name: Build and Push Frontend
      run: |
        docker build -t $ACR_LOGIN_SERVER/$FRONTEND_IMAGE:latest ./frontend
        docker push $ACR_LOGIN_SERVER/$FRONTEND_IMAGE:latest


# =========================
# DEPLOY FRONTEND (PUBLIC VM)
# =========================
  deploy-frontend:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
    - name: Deploy Frontend to Public VM
      uses: appleboy/ssh-action@v0.1.10
      with:
        host: ${{ secrets.FRONTEND_VM_IP }}
        username: ${{ secrets.VM_USERNAME }}
        key: ${{ secrets.VM_SSH_KEY }}
        port: 22
        script: |
          #!/bin/bash
          set -e

          # Define variables (IMPORTANT)
          ACR_LOGIN_SERVER=skincarecontainer.azurecr.io
          FRONTEND_IMAGE=skincare-frontend

          # Install Docker if missing
          if ! command -v docker &> /dev/null; then
            sudo apt update
            sudo DEBIAN_FRONTEND=noninteractive apt install -y docker.io
            sudo systemctl enable docker
            sudo systemctl start docker
          fi

          # Login to Azure Container Registry
          echo '${{ secrets.ACR_PASSWORD }}' | sudo docker login $ACR_LOGIN_SERVER \
            -u ${{ secrets.ACR_USERNAME }} --password-stdin

          # Pull latest image
          sudo docker pull $ACR_LOGIN_SERVER/$FRONTEND_IMAGE:latest

          # Stop and remove old container
          sudo docker stop frontend || true
          sudo docker rm frontend || true

          # Run new container
          sudo docker run -d -p 80:80 --name frontend \
            $ACR_LOGIN_SERVER/$FRONTEND_IMAGE:latest


# =========================
# DEPLOY BACKEND (PRIVATE VM)
# =========================
  deploy-backend:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
    - name: Deploy Backend to Private VM
      uses: appleboy/ssh-action@v0.1.10
      with:
        host: ${{ secrets.BACKEND_VM_IP }}
        username: ${{ secrets.VM_USERNAME }}
        key: ${{ secrets.VM_SSH_KEY }}
        port: 22
        script: |
          #!/bin/bash
          set -e

          # Define variables (IMPORTANT)
          ACR_LOGIN_SERVER=skincarecontainer.azurecr.io
          BACKEND_IMAGE=skincare-backend

          # Install Docker if missing
          if ! command -v docker &> /dev/null; then
            sudo apt update
            sudo DEBIAN_FRONTEND=noninteractive apt install -y docker.io
            sudo systemctl enable docker
            sudo systemctl start docker
          fi

          # Login to Azure Container Registry
          echo '${{ secrets.ACR_PASSWORD }}' | sudo docker login $ACR_LOGIN_SERVER \
            -u ${{ secrets.ACR_USERNAME }} --password-stdin

          # Pull latest image
          sudo docker pull $ACR_LOGIN_SERVER/$BACKEND_IMAGE:latest

          # Stop and remove old container
          sudo docker stop backend || true
          sudo docker rm backend || true

          # Run new container
          sudo docker run -d -p 8000:8000 --name backend \
            $ACR_LOGIN_SERVER/$BACKEND_IMAGE:latest