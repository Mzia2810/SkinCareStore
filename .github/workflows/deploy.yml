name: Skincare Docker CI/CD

on:
  push:
    branches:
      - main

env:
  ACR_LOGIN_SERVER: skincarecontainer.azurecr.io
  BACKEND_IMAGE: skincare-backend
  FRONTEND_IMAGE: skincare-frontend

jobs:

  build-and-push:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout Repository
      uses: actions/checkout@v3

    # Login to Azure Container Registry
    - name: Login to ACR
      run: |
        echo "${{ secrets.ACR_PASSWORD }}" | docker login $ACR_LOGIN_SERVER \
        --username ${{ secrets.ACR_USERNAME }} \
        --password-stdin

    # Build Backend Image
    - name: Build Backend
      run: |
        docker build -t $ACR_LOGIN_SERVER/$BACKEND_IMAGE:latest ./backend

    # Push Backend Image
    - name: Push Backend
      run: |
        docker push $ACR_LOGIN_SERVER/$BACKEND_IMAGE:latest

    # Build Frontend Image
    - name: Build Frontend
      run: |
        docker build -t $ACR_LOGIN_SERVER/$FRONTEND_IMAGE:latest ./frontend

    # Push Frontend Image
    - name: Push Frontend
      run: |
        docker push $ACR_LOGIN_SERVER/$FRONTEND_IMAGE:latest

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:

    - name: Deploy Frontend to Public VM
      uses: appleboy/ssh-action@v0.1.10
      with:
        host: ${{ secrets.FRONTEND_VM_IP }}
        username: ${{ secrets.VM_USERNAME }}
        key: ${{ secrets.VM_SSH_KEY }}
        script: |

          docker login skincarecontainer.azurecr.io \
          -u ${{ secrets.ACR_USERNAME }} \
          -p ${{ secrets.ACR_PASSWORD }}

          docker pull skincarecontainer.azurecr.io/skincare-frontend:latest

          docker stop frontend || true
          docker rm frontend || true

          docker run -d \
          -p 80:80 \
          --name frontend \
          skincarecontainer.azurecr.io/skincare-frontend:latest

          
  deploy-backend:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:

    - name: Deploy Backend to Private VM
      uses: appleboy/ssh-action@v0.1.10
      with:
        host: ${{ secrets.BACKEND_VM_IP }}
        username: ${{ secrets.VM_USERNAME }}
        key: ${{ secrets.VM_SSH_KEY }}
        script: |

          docker login skincarecontainer.azurecr.io \
          -u ${{ secrets.ACR_USERNAME }} \
          -p ${{ secrets.ACR_PASSWORD }}

          docker pull skincarecontainer.azurecr.io/skincare-backend:latest

          docker stop backend || true
          docker rm backend || true

          docker run -d \
          -p 8000:8000 \
          --name backend \
          skincarecontainer.azurecr.io/skincare-backend:latest


  