name: Skincare Docker CI/CD to Azure VM

on:
  push:
    branches:
      - main

env:
  ACR_LOGIN_SERVER: skincarecontainer.azurecr.io

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Login to Azure Container Registry
      - name: Login to ACR
        run: |
          echo "${{ secrets.ACR_PASSWORD }}" | docker login ${{ env.ACR_LOGIN_SERVER }} \
          --username ${{ secrets.ACR_USERNAME }} \
          --password-stdin

      # -----------------------------
      # BUILD BACKEND (Node.js)
      # -----------------------------
      - name: Build Backend Docker Image
        run: |
          cd backend
          npm install
          docker build -t ${{ env.ACR_LOGIN_SERVER }}/skincare-backend:latest .

      - name: Push Backend Image
        run: |
          docker push ${{ env.ACR_LOGIN_SERVER }}/skincare-backend:latest

      # -----------------------------
      # BUILD FRONTEND (Vite + Nginx)
      # -----------------------------
      - name: Build Frontend Docker Image
        run: |
          cd frontend
          npm install
          npm run build
          docker build -t ${{ env.ACR_LOGIN_SERVER }}/skincare-frontend:latest .

      - name: Push Frontend Image
        run: |
          docker push ${{ env.ACR_LOGIN_SERVER }}/skincare-frontend:latest

      # -----------------------------
      # DEPLOY BACKEND VM
      # -----------------------------
      - name: Deploy Backend VM
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.BACKEND_VM_IP }}
          username: ${{ secrets.VM_USERNAME }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            docker login ${{ env.ACR_LOGIN_SERVER }} -u ${{ secrets.ACR_USERNAME }} -p ${{ secrets.ACR_PASSWORD }}

            docker pull ${{ env.ACR_LOGIN_SERVER }}/skincare-backend:latest

            docker stop backend || true
            docker rm backend || true

            docker run -d \
              -p 8000:8000 \
              --name backend \
              --restart unless-stopped \
              ${{ env.ACR_LOGIN_SERVER }}/skincare-backend:latest

      # -----------------------------
      # DEPLOY FRONTEND VM
      # -----------------------------
      - name: Deploy Frontend VM
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.FRONTEND_VM_IP }}
          username: ${{ secrets.VM_USERNAME }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            docker login ${{ env.ACR_LOGIN_SERVER }} -u ${{ secrets.ACR_USERNAME }} -p ${{ secrets.ACR_PASSWORD }}

            docker pull ${{ env.ACR_LOGIN_SERVER }}/skincare-frontend:latest

            docker stop frontend || true
            docker rm frontend || true

            docker run -d \
              -p 80:80 \
              --name frontend \
              --restart unless-stopped \
              ${{ env.ACR_LOGIN_SERVER }}/skincare-frontend:latest