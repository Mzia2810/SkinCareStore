name: Deploy to Azure VM

on:
  push:
    branches:
      - main   # Jab main branch me push ho

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Setup Node.js
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '20'  # backend + frontend ke liye LTS

      # 3️⃣ Install backend dependencies
      - name: Install backend dependencies
        working-directory: ./backend
        run: npm install

      # 4️⃣ Build frontend
      - name: Build frontend
        working-directory: ./frontend
        run: |
          npm install
          npm run build

      # 5️⃣ Copy backend + frontend to VM
      - name: Copy files to Azure VM
        uses: appleboy/scp-action@v0.1.5
        with:
          host: ${{ secrets.VM_IP }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: 22
          source: |
            backend/**
            frontend/**
          target: /home/${{ secrets.VM_USER }}/SkinCareStore

      # 6️⃣ SSH into VM: start backend + set permissions + restart Nginx
      - name: SSH and deploy
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ secrets.VM_IP }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: 22
          script: |
            # Navigate to backend
            cd /home/${{ secrets.VM_USER }}/SkinCareStore/backend

            # Stop previous PM2 process (if any) and start backend
            pm2 stop skin-backend || true
            pm2 start index.js --name skin-backend
            pm2 save

            # Set frontend permissions
            sudo chown -R www-data:www-data /home/${{ secrets.VM_USER }}/SkinCareStore/frontend/dist
            sudo chmod -R 755 /home/${{ secrets.VM_USER }}/SkinCareStore/frontend/dist

            # Restart Nginx to serve frontend
            sudo systemctl restart nginx