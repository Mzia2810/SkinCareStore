trigger:
  branches:
    include:
      - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  NODE_VERSION: '20.x'
  BACKEND_DIR: 'backend'

stages:
- stage: Build_Backend
  displayName: "Build & Deploy Backend"
  jobs:
    - job: Backend
      displayName: "Backend Build & Deploy"
      steps:
        # Install Node.js
        - task: NodeTool@0
          inputs:
            versionSpec: '$(NODE_VERSION)'
          displayName: 'Install Node.js'

        # Checkout code
        - checkout: self

        # Install dependencies
        - script: |
            cd $(BACKEND_DIR)
            npm install
          displayName: 'Install Backend Dependencies'

        # Optional build (if any)
        - script: |
            cd $(BACKEND_DIR)
            npm run build || echo "No build step for backend"
          displayName: 'Build Backend'

        # Prepare artifact
        - task: CopyFiles@2
          inputs:
            Contents: '$(BACKEND_DIR)/**'
            TargetFolder: '$(Build.ArtifactStagingDirectory)/backend'
          displayName: 'Prepare Backend Artifact'

        # Deploy to Azure Web App
        - task: AzureWebApp@1
          inputs:
            azureSubscription: '<YOUR_AZURE_SERVICE_CONNECTION>'
            appName: '<YOUR_BACKEND_APP_NAME>'
            package: '$(Build.ArtifactStagingDirectory)/backend'
            deploymentMethod: 'auto'
          displayName: 'Deploy Backend to Azure'